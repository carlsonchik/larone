name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lar1-core:
    name: "@lar-1/core conformance"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/lar1-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/lar1-core/package-lock.json
      - run: npm ci
      - run: npm test

  lar1-a2a:
    name: "@lar-1/a2a"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/lar1-a2a
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm test

  lar1-mcp:
    name: "@lar-1/mcp"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/lar1-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm test

  lar1-python:
    name: "lar-1 Python conformance"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/lar1-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -q

  lar1-cli:
    name: "@lar-1/cli smoke"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/lar1-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install ../lar1-core
      - run: npm install
      - run: npm run build
      - run: node dist/cli.js validate "LAR:C=obs,L=0.9"

  mcp-demo:
    name: "MCP demo build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demos/mcp-lar1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build

  langgraph-demo:
    name: "LangGraph demo (smoke)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demos/langgraph-synthesis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m synthesis.compare

  noisy-l-experiment:
    name: "Noisy-L experiment (Phase 3)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demos/noisy-l-experiment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - run: pytest -q
      - run: python -m experiment.run
